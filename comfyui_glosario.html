<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComfyUI — Glosario</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border-bright: #3d3d3d;
    --text: #e8e6e0;
    --text-dim: #6b6b6b;
    --text-mid: #9a9a9a;
    --accent-purple: #7c6df8;
    --accent-teal: #2dd4a0;
    --accent-amber: #f5a623;
    --accent-coral: #f06448;
    --accent-blue: #4da6ff;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--accent-teal);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-tag::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: var(--accent-teal);
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(28px, 5vw, 46px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 span {
    color: var(--accent-purple);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-mid);
    font-weight: 300;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px 10px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent-purple);
  }

  input[type="text"]::placeholder { color: var(--text-dim); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 7px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--border-bright); color: var(--text-mid); }

  .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--border-bright);
  }

  .filter-btn[data-cat="all"].active { border-color: var(--text-dim); }
  .filter-btn[data-cat="Estructura base"].active { border-color: var(--accent-purple); color: var(--accent-purple); }
  .filter-btn[data-cat="Modelos y carga"].active { border-color: var(--accent-teal); color: var(--accent-teal); }
  .filter-btn[data-cat="Generación de imagen"].active { border-color: var(--accent-amber); color: var(--accent-amber); }
  .filter-btn[data-cat="Espacio latente"].active { border-color: var(--accent-coral); color: var(--accent-coral); }
  .filter-btn[data-cat="Prompts y texto"].active { border-color: var(--accent-blue); color: var(--accent-blue); }

  /* Stats */
  .stats {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stats span { color: var(--text-mid); }

  /* Main grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover { background: var(--surface2); border-color: var(--border-bright); }

  .card.open { background: var(--surface2); }

  /* Accent bar */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.open::before { opacity: 1; }

  .card[data-color="purple"]::before { background: var(--accent-purple); }
  .card[data-color="teal"]::before   { background: var(--accent-teal); }
  .card[data-color="amber"]::before  { background: var(--accent-amber); }
  .card[data-color="coral"]::before  { background: var(--accent-coral); }
  .card[data-color="blue"]::before   { background: var(--accent-blue); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    justify-content: space-between;
  }

  .card-left { flex: 1; min-width: 0; }

  .cat-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .cat-dot.purple { background: var(--accent-purple); }
  .cat-dot.teal   { background: var(--accent-teal); }
  .cat-dot.amber  { background: var(--accent-amber); }
  .cat-dot.coral  { background: var(--accent-coral); }
  .cat-dot.blue   { background: var(--accent-blue); }

  .term-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .term-alias {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .toggle-icon {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text-dim);
    transition: transform 0.2s, color 0.15s;
    flex-shrink: 0;
    margin-top: 2px;
    line-height: 1;
  }

  .card.open .toggle-icon {
    transform: rotate(45deg);
    color: var(--text-mid);
  }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.25s ease;
    opacity: 0;
  }

  .card.open .card-body {
    max-height: 300px;
    opacity: 1;
  }

  .card-body-inner {
    padding-top: 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.65;
    font-weight: 300;
  }

  .card-body-inner strong {
    color: var(--text);
    font-weight: 500;
  }

  .card-body-inner code {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent-teal);
  }

  /* Section headers */
  .section-header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 24px 0 8px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .section-header .line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-header.purple { color: var(--accent-purple); }
  .section-header.teal   { color: var(--accent-teal); }
  .section-header.amber  { color: var(--accent-amber); }
  .section-header.coral  { color: var(--accent-coral); }
  .section-header.blue   { color: var(--accent-blue); }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 0;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  .empty::before {
    content: '// ';
    color: var(--border-bright);
  }

  /* Connection lines decoration */
  .deco {
    position: fixed;
    top: 0; right: 0;
    width: 300px;
    height: 300px;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<svg class="deco" viewBox="0 0 300 300">
  <circle cx="200" cy="100" r="60" fill="none" stroke="white" stroke-width="0.5"/>
  <circle cx="200" cy="100" r="100" fill="none" stroke="white" stroke-width="0.5"/>
  <circle cx="200" cy="100" r="140" fill="none" stroke="white" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="300" y2="100" stroke="white" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="300" stroke="white" stroke-width="0.5"/>
</svg>

<div class="container">

  <header>
    <div class="header-tag">reference / ComfyUI</div>
    <h1>Glosario<br><span>interactivo</span></h1>
    <p class="subtitle">25 conceptos esenciales para entender el flujo de trabajo en ComfyUI</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">_</span>
      <input type="text" id="search" placeholder="buscar término..." oninput="render()">
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>

</div>

<script>
const cats = [
  {
    name: "Estructura base",
    color: "purple",
    items: [
      {
        term: "Nodo",
        alias: "Node",
        def: "El bloque fundamental de ComfyUI. Cada nodo realiza una tarea específica: cargar un modelo, escribir un prompt, generar la imagen. Se conectan entre sí arrastrando cables entre sus puntos de entrada y salida para crear el flujo."
      },
      {
        term: "Workflow",
        alias: "Flujo de trabajo",
        def: "El conjunto completo de nodos conectados que define cómo se genera una imagen. Se guarda como archivo <code>JSON</code> y se puede compartir, importar o arrastrar directamente al canvas."
      },
      {
        term: "Canvas",
        alias: "Área de trabajo",
        def: "El espacio infinito donde arrastras, conectas y organizas tus nodos. Navega con clic derecho + arrastrar. Zoom con la rueda del mouse. Doble clic en el canvas para buscar y agregar nuevos nodos."
      },
      {
        term: "Queue Prompt",
        alias: "Iniciar generación",
        def: "El botón que envía tu workflow a procesar. Puedes poner varios en cola seguidos. En la parte superior aparece el número de trabajos pendientes. <strong>Ctrl+Enter</strong> es el atajo de teclado."
      }
    ]
  },
  {
    name: "Modelos y carga",
    color: "teal",
    items: [
      {
        term: "Checkpoint",
        alias: "Modelo principal",
        def: "El modelo de IA que define el estilo visual y las capacidades de generación. Va en <code>models/checkpoints/</code>. Cada arquitectura (SD 1.5, SDXL, FLUX) tiene capacidades distintas."
      },
      {
        term: "Load Checkpoint",
        alias: "Nodo de carga",
        def: "Nodo que carga el checkpoint al inicio del workflow. Tiene tres salidas: <strong>MODEL</strong> (la red neuronal principal), <strong>CLIP</strong> (codificador de texto) y <strong>VAE</strong> (decodificador de imagen)."
      },
      {
        term: "LoRA",
        alias: "Low-Rank Adaptation",
        def: "Modelo pequeño que se aplica sobre un checkpoint para modificar su estilo o añadir conceptos específicos sin reentrenar todo el modelo. Va en <code>models/loras/</code>. Se conecta con el nodo <strong>Load LoRA</strong>."
      },
      {
        term: "VAE",
        alias: "Variational Autoencoder",
        def: "Componente que traduce entre el espacio latente (matemático, comprimido) y píxeles reales. Necesario para codificar imágenes de entrada (img2img) y decodificar el resultado final en pixeles visibles."
      },
      {
        term: "CLIP",
        alias: "Codificador de texto",
        def: "Convierte tu prompt en vectores numéricos que la red neuronal puede interpretar. Algunos modelos como FLUX usan doble CLIP (CLIP-L + T5). Siempre viene incluido en el checkpoint."
      }
    ]
  },
  {
    name: "Generación de imagen",
    color: "amber",
    items: [
      {
        term: "KSampler",
        alias: "Nodo central",
        def: "El corazón del proceso de generación. Recibe el modelo, los prompts codificados y el latente de entrada, y aplica el algoritmo de denoising para producir la imagen. Contiene todos los parámetros clave."
      },
      {
        term: "Steps",
        alias: "Pasos de denoising",
        def: "Cuántas veces el modelo refina la imagen. Más pasos = más calidad pero más tiempo. Para pruebas usa <strong>10–15</strong>. Para resultados finales <strong>20–30</strong>. Por encima de 40 raramente mejora."
      },
      {
        term: "CFG",
        alias: "Classifier Free Guidance",
        def: "Controla qué tan literal sigue el modelo tu prompt. <strong>3–5</strong> = más creatividad y variedad. <strong>7–8</strong> = equilibrio recomendado. <strong>10+</strong> = muy adherido al texto pero puede sobrecontrastar."
      },
      {
        term: "Denoise",
        alias: "Nivel de modificación",
        def: "En img2img controla cuánto se modifica la imagen original. <strong>0</strong> = sin cambios. <strong>0.5</strong> = mezcla equilibrada recomendada para empezar. <strong>1.0</strong> = ignora completamente la imagen de entrada."
      },
      {
        term: "Sampler",
        alias: "Algoritmo de muestreo",
        def: "El método matemático que realiza los pasos de denoising. <strong>euler</strong> + <strong>normal</strong> es el combo estándar. <strong>dpm++ 2m</strong> + <strong>karras</strong> da buenos resultados con menos steps."
      },
      {
        term: "Seed",
        alias: "Semilla aleatoria",
        def: "Número que inicializa la aleatoriedad. El mismo seed + mismos parámetros = misma imagen, siempre reproducible. Usa <strong>-1</strong> para seed aleatorio en cada generación y explorar variaciones."
      }
    ]
  },
  {
    name: "Espacio latente",
    color: "coral",
    items: [
      {
        term: "Latent space",
        alias: "Espacio latente",
        def: "Representación matemática comprimida de la imagen — no son píxeles, son vectores. Todo el proceso de generación ocurre aquí para ser más eficiente. El VAE los convierte en imagen real al final."
      },
      {
        term: "Empty Latent Image",
        alias: "Lienzo vacío",
        def: "Nodo que crea un canvas vacío en espacio latente. Define el tamaño de la imagen de salida. Úsalo en workflows de <strong>txt2img</strong>. Para img2img lo reemplaza el VAE Encode con tu imagen."
      },
      {
        term: "VAE Encode",
        alias: "Imagen → latente",
        def: "Convierte una imagen real (píxeles) en espacio latente para que el KSampler pueda procesarla. Necesario para img2img: toma tu imagen de referencia y la prepara para ser modificada."
      },
      {
        term: "VAE Decode",
        alias: "Latente → imagen",
        def: "El paso final: convierte el resultado del KSampler (espacio latente) en una imagen con píxeles reales. Siempre va después del KSampler. Necesita la salida <strong>LATENT</strong> del sampler y el <strong>VAE</strong> del checkpoint."
      }
    ]
  },
  {
    name: "Prompts y texto",
    color: "blue",
    items: [
      {
        term: "CLIP Text Encode",
        alias: "Nodo de prompt",
        def: "Donde escribes tu prompt. Necesitas dos instancias: una para el prompt <strong>positivo</strong> y otra para el <strong>negativo</strong>. Su salida de tipo <code>CONDITIONING</code> va directo al KSampler."
      },
      {
        term: "Prompt positivo",
        alias: "Lo que quieres",
        def: "Descripción de lo que quieres generar. Sé específico: estilo, iluminación, tipo de cámara, composición, mood. Más detalle generalmente da mejores resultados, especialmente en SDXL y FLUX."
      },
      {
        term: "Prompt negativo",
        alias: "Lo que quieres evitar",
        def: "Términos a evitar: <code>blurry, deformed, ugly, bad anatomy, watermark, low quality</code>. Nota: algunos modelos modernos como FLUX prácticamente ignoran el negativo — es menos relevante en arquitecturas nuevas."
      },
      {
        term: "Conditioning",
        alias: "Texto codificado",
        def: "El tipo de dato que sale del CLIP Text Encode. Lleva la información del prompt en forma de vectores numéricos para que el KSampler la use como guía durante cada paso de generación."
      },
      {
        term: "Save Image",
        alias: "Guardar imagen",
        def: "Nodo final del workflow. Toma la salida <code>IMAGE</code> del VAE Decode y guarda el archivo. También muestra la imagen en el canvas. Los archivos van a <code>ComfyUI/output/</code> por defecto."
      }
    ]
  }
];

const catNames = ["all", ...cats.map(c => c.name)];
let activeFilter = "all";

function buildFilters() {
  const wrap = document.getElementById("filters");
  catNames.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (c === "all" ? " active" : "");
    btn.dataset.cat = c;
    btn.textContent = c === "all" ? "Todos" : c;
    btn.onclick = () => {
      activeFilter = c;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    wrap.appendChild(btn);
  });
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:#7c6df844;color:var(--accent-purple);border-radius:2px">$1</mark>');
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const grid = document.getElementById("grid");
  const stats = document.getElementById("stats");
  grid.innerHTML = "";

  let totalShown = 0;

  cats.forEach(cat => {
    if (activeFilter !== "all" && activeFilter !== cat.name) return;

    const filtered = cat.items.filter(it => {
      if (!q) return true;
      return it.term.toLowerCase().includes(q) ||
             (it.alias && it.alias.toLowerCase().includes(q)) ||
             it.def.toLowerCase().includes(q);
    });

    if (!filtered.length) return;
    totalShown += filtered.length;

    const hdr = document.createElement("div");
    hdr.className = `section-header ${cat.color}`;
    hdr.innerHTML = `<span>${cat.name}</span><span class="line"></span>`;
    grid.appendChild(hdr);

    filtered.forEach((item, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.color = cat.color;
      card.style.animationDelay = (i * 0.04) + "s";

      card.innerHTML = `
        <div class="card-header">
          <div class="card-left">
            <div class="term-name">${highlight(item.term, q)}</div>
            ${item.alias ? `<div class="term-alias">${highlight(item.alias, q)}</div>` : ""}
          </div>
          <span class="cat-dot ${cat.color}"></span>
          <span class="toggle-icon">+</span>
        </div>
        <div class="card-body">
          <div class="card-body-inner">${highlight(item.def, q)}</div>
        </div>
      `;

      card.addEventListener("click", () => {
        const wasOpen = card.classList.contains("open");
        document.querySelectorAll(".card.open").forEach(c => c.classList.remove("open"));
        if (!wasOpen) card.classList.add("open");
      });

      grid.appendChild(card);
    });
  });

  if (!totalShown) {
    grid.innerHTML = `<div class="empty">no se encontraron términos para "${q}"</div>`;
  }

  stats.innerHTML = `<span>${totalShown}</span> términos &nbsp;·&nbsp; <span>${cats.length}</span> categorías`;
}

buildFilters();
render();
</script>
</body>
</html>
